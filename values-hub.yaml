clusterGroup:
  name: hub
  isHubCluster: true

  namespaces:
    - open-cluster-management
    - vault
    - golang-external-secrets
    - openshift-nfd
    - nvidia-gpu-operator
    - redhat-ods-operator:
        operatorGroup: true
        targetNamespaces: []
    - rag-llm:
        labels:
          opendatahub.io/dashboard: "true"
          modelmesh-enabled: 'false'
    - openshift-serverless:
        operatorGroup: true
        targetNamespaces: []

  subscriptions:
    # Don't install RHOAI via validated patterns
    # RHOAI must be installed after service mesh and other dependencies are installed or it will break.
    # The RHOAI Application will install the operator after a validation check has passed
    nfd:
      name: nfd
      namespace: openshift-nfd
      channel: stable
    nvidia:
      name: gpu-operator-certified
      namespace: nvidia-gpu-operator
      channel: v24.6
      source: certified-operators
    edb:
      name: cloud-native-postgresql
      namespace: openshift-operators
      channel: stable-v1.23
      source: certified-operators
    serverless:
      name: serverless-operator
      namespace: openshift-serverless
      channel: stable
    servicemesh:
      name: servicemeshoperator
      namespace: openshift-operators
      channel: stable
    rhoai:
      name: rhods-operator
      namespace: redhat-ods-operator
      channel: stable-2.16
      source: redhat-operators
      sourceNamespace: openshift-marketplace

  projects:
    - hub
    - rag-llm
    - llm-monitoring
    - gpu-config
    - openshift-ai

  applications:
    vault:
      name: vault
      namespace: vault
      project: hub
      chart: hashicorp-vault
      chartVersion: 0.1.*
    golang-external-secrets:
      name: golang-external-secrets
      namespace: golang-external-secrets
      project: hub
      chart: golang-external-secrets
      chartVersion: 0.1.*
    minio:
      name: minio
      namespace: rag-llm
      project: hub
      path: charts/all/minio
    llm-serving-service:
      name: llm-serving-service
      namespace: rag-llm
      project: hub
      path: charts/all/llm-serving-service
      syncPolicy:
        automated: {}
        retry:
          limit: 50
    rag-llm:
      name: rag-llm
      namespace: rag-llm
      project: rag-llm
      path: charts/all/rag-llm
    llm-monitoring:
      name: llm-monitoring
      namespace: llm-monitoring
      project: llm-monitoring
      kustomize: true
      path: charts/all/llm-monitoring/kustomize/overlays/dev
    nfd-config:
      name: nfd-config
      namespace: openshift-cfd
      project: gpu-config
      path: charts/all/nfd-config
    nvidia-config:
      name: nvidia-config
      namespace: nvidia-network-operator
      project: gpu-config
      path: charts/all/nvidia-gpu-config
    llm-ui-config:
      name: rag-llm-ui-config
      namespace: rag-llm
      project: gpu-config
      path: charts/all/rag-llm-ui-config
    llm-monitoring-config:
      name: grafana-ui-config
      namespace: llm-monitoring
      project: gpu-config
      path: charts/all/llm-monitoring-config
    openshift-ai:
      name: openshift-ai
      namespace: redhat-ods-operator
      project: openshift-ai
      path: charts/all/rhods
